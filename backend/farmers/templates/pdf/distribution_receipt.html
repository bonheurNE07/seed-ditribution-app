<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <style>
        body { font-family: Helvetica, sans-serif; font-size: 12px; }
        h2 { text-align: center; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { border: 1px solid #000; padding: 6px; }
    </style>
</head>
<body>
    <h2>Seed Distribution Receipt</h2>
    <p><strong>Farmer:</strong> {{ distribution.farmer.full_name }}</p>
    <p><strong>Agent:</strong> {{ distribution.agent.username }}</p>
    <p><strong>Date:</strong> {{ distribution.distributed_at }}</p>

    <table>
        <thead>
            <tr>
                <th>Species</th>
                <th>Quantity</th>
            </tr>
        </thead>
        <tbody>
            {% for item in distribution.items.all %}
            <tr>
                <td>{{ item.species.name }}</td>
                <td>{{ item.quantity }}</td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</body>
</html>
